services:
  postgres:
    image: postgres:16
    container_name: olist_pipeline_db
    restart: unless-stopped
 
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
 
    ports:
      - "${DB_PORT}:5432"
 
    volumes:
      # Persiste os dados mesmo se o container for reiniciado
      - postgres_data:/var/lib/postgresql/data
      # Roda o script de setup na primeira vez que o container sobe
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
 
volumes:
  postgres_data: